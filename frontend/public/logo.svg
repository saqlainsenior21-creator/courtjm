<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="purpleG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="55%" stop-color="#6b21a8"/><stop offset="100%" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="goldG5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fcd34d"/><stop offset="55%" stop-color="#FFD100"/><stop offset="100%" stop-color="#92400e"/></linearGradient>
  </defs>
  <path d="M40 6 L72 16 L72 44 Q72 62 40 74 Q8 62 8 44 L8 16 Z" fill="url(#purpleG)" stroke="url(#goldG5)" stroke-width="2.5"/>
  <!-- Scales of justice -->
  <g transform="translate(40 40)">
    <!-- Center column -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke="url(#goldG5)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Top knob -->
    <circle cx="0" cy="-15" r="2.4" fill="url(#goldG5)"/>
    <!-- Crossbeam -->
    <line x1="-14" y1="-9" x2="14" y2="-9" stroke="url(#goldG5)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Left pan (chains + dish) -->
    <line x1="-14" y1="-9" x2="-14" y2="-2" stroke="#fff" stroke-width="1" stroke-dasharray="1 1"/>
    <path d="M-19 -2 Q-14 5 -9 -2 Z" fill="#fff" stroke="#0f172a" stroke-width="1"/>
    <!-- Right pan -->
    <line x1="14" y1="-9" x2="14" y2="-2" stroke="#fff" stroke-width="1" stroke-dasharray="1 1"/>
    <path d="M9 -2 Q14 5 19 -2 Z" fill="#fff" stroke="#0f172a" stroke-width="1"/>
    <!-- Base -->
    <rect x="-9" y="15" width="18" height="3" rx="1" fill="url(#goldG5)"/>
  </g>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-weight="900">
    <text x="92" y="40" font-size="26" fill="#0f172a" letter-spacing="0.5">Court</text>
    <text x="158" y="40" font-size="26" fill="url(#purpleG)" letter-spacing="0.5">JM</text>
    <text x="92" y="60" font-size="10" fill="#64748b" letter-spacing="3" font-weight="700">MINISTRY OF JUSTICE · CASE MANAGEMENT</text>
  </g>
  <rect x="92" y="46" width="195" height="1.5" fill="url(#goldG5)" rx="0.75"/>
</svg>
